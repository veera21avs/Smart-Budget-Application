<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Budget Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>

<body>

<div class="container">

    <div class="wallet-card">
        <div class="wallet-icon">💰</div>

        <div>
            <h3>Current Balance</h3>
            <h1 id="balance"></h1>
        </div>
    </div>

    <div class="budget-card">

        <input type="number" id="totalAmount" placeholder="Enter Total Amount">

        <input type="number" id="dailyBudget" placeholder="Enter Today's Budget">
        <button onclick="setBudget()">
             Set Budget
        </button>

    </div>

    <div class="expense-card">

        <h2>Add Expense</h2>

        <input
        type="text"
        id="expenseName"
        placeholder="Expense Name">

        <input
        type="number"
        id="expenseAmount"
        placeholder="Expense Amount">

        <button onclick="addExpense()">
            Add Expense
        </button>

    </div>

    <div class="summary-card">

        <p>Today's Budget : <span id="budget">₹</span></p>

        <p>Total Spent : <span id="spent">₹</span></p>

        <p>Remaining : <span id="remaining">₹</span></p>

    </div>

    <div class="history-card">

        <h2>Expense History</h2>

        <ul id="expenseList"></ul>

    </div>

</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
